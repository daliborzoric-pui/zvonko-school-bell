<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zvonko - Prijava</title>

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="login-page">

    <div class="login-container">
        <div class="login-card">

            <!-- LOGO -->
            <img src="{{ url_for('static', filename='bell.svg') }}" alt="Zvonko logo" class="login-logo">

            <!-- NASLOV -->
            <h1 class="login-title">Zvonko</h1>
            <p class="login-subtitle">Pametno školsko zvono</p>

            <!-- ERROR -->
            {% if error %}
                <div class="alert-error">{{ error }}</div>
            {% endif %}

            <!-- FORMA -->
            <form method="POST" class="login-form">
                <label for="username">Korisničko ime</label>
                <input type="text" id="username" name="username" required>

                <label for="password">Lozinka</label>
                <input type="password" id="password" name="password" required>

                <button type="submit" class="btn-primary">Prijava</button>
            </form>

            <!-- POWERED BY (TEKST) -->
            <div class="powered-by-text">
                <span>Powered by</span>
                <strong>DigitalNET</strong>
                <small>Grude</small>
            </div>

        </div>
    </div>

</body>
</html>
